server:
  port: ${PORT:8761}

spring:
  application:
    name: DISCOVERY-SERVER

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  server:
    enable-self-preservation: true
  instance:
    hostname: ${RENDER_EXTERNAL_HOSTNAME:localhost}

logging:
  level:
    com.netflix.eureka: OFF
    com.netflix.discovery: OFF